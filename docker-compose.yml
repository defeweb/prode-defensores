version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: prode_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: RootSeguro2025!
      MYSQL_DATABASE: prode_defensores
      MYSQL_USER: prode_user
      MYSQL_PASSWORD: ProdePass2025!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prode_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
